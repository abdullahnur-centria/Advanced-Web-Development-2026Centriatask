<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservations | Booking System</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              primary: "#e10e49",
              light: "#ffffff",
              dark: "#1e1e1e",
              blue: "#263f6a",
              green: "#284e36",
              orange: "#e37222",
              rose: "#c24d52",
            }
          },
          boxShadow: {
            soft: "0 8px 40px rgba(0, 0, 0, 0.45)",
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 text-brand-dark font-sans min-h-screen">

  <header class="bg-brand-light shadow-md py-4 px-8 flex justify-between items-center mb-8">
    <div class="text-xl font-bold flex items-center gap-2">
      <span class="bg-brand-primary text-white px-2 py-1 rounded text-sm">BS</span> 
      Booking System
    </div>
    <nav class="flex gap-6 text-sm font-medium">
      <a href="/" class="hover:text-brand-primary transition">Home</a>
      <a href="/resources" class="hover:text-brand-primary transition">Resources</a>
      <a href="/reservations" class="text-brand-primary border-b-2 border-brand-primary pb-1">Reservations</a>
      <a href="#" id="logoutBtn" class="hover:text-brand-rose transition">Logout</a>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto px-4 mb-12">
    <div class="mb-8 bg-brand-light p-8 rounded-xl shadow-soft">
      <h1 class="text-3xl font-bold mb-2">Reservations</h1>
      <p class="text-gray-600">Create, update, or remove reservations in the system.</p>
    </div>

    <div id="messageArea" class="hidden p-4 mb-6 rounded-md font-medium text-center"></div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <section class="lg:col-span-1 bg-brand-light p-6 rounded-xl shadow-soft self-start">
        <h2 id="formTitle" class="text-xl font-bold mb-4 border-b pb-2">Create Reservation</h2>
        
        <form id="reservationForm" class="space-y-4">
          <input type="hidden" id="reservationId">

          <div>
            <label for="resourceId" class="block text-sm font-medium text-gray-700 mb-1">Resource ID (Number)</label>
            <input type="number" id="resourceId" required class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-brand-primary focus:outline-none">
          </div>

          <div>
            <label for="userId" class="block text-sm font-medium text-gray-700 mb-1">User ID (Number)</label>
            <input type="number" id="userId" required class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-brand-primary focus:outline-none">
          </div>

          <div>
            <label for="startTime" class="block text-sm font-medium text-gray-700 mb-1">Start Time</label>
            <input type="datetime-local" id="startTime" required class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-brand-primary focus:outline-none">
          </div>

          <div>
            <label for="endTime" class="block text-sm font-medium text-gray-700 mb-1">End Time</label>
            <input type="datetime-local" id="endTime" required class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-brand-primary focus:outline-none">
          </div>

          <div>
            <label for="note" class="block text-sm font-medium text-gray-700 mb-1">Note (Optional)</label>
            <input type="text" id="note" placeholder="e.g., Team meeting" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-brand-primary focus:outline-none">
          </div>

          <div>
            <label for="status" class="block text-sm font-medium text-gray-700 mb-1">Status</label>
            <select id="status" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-brand-primary focus:outline-none">
              <option value="active">Active</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>

          <div class="flex gap-3 pt-4 border-t mt-6">
            <button type="submit" id="saveBtn" class="flex-1 bg-brand-primary text-white py-2 rounded-md font-medium hover:bg-brand-rose transition shadow-md">Create</button>
            <button type="button" id="clearBtn" class="flex-1 bg-gray-200 text-gray-800 py-2 rounded-md font-medium hover:bg-gray-300 transition">Clear</button>
          </div>
        </form>
      </section>

      <section class="lg:col-span-2 flex flex-col gap-4">
        <div class="bg-brand-light p-6 rounded-xl shadow-soft">
          <h2 class="text-xl font-bold mb-2">Existing Reservations</h2>
          <p class="text-sm text-gray-500 mb-4">Click edit or delete on an item below to manage it.</p>
          
          <ul id="reservationList" class="space-y-3">
            </ul>
        </div>
      </section>
      
    </div>
  </main>

  <script>
    const form = document.getElementById('reservationForm');
    const messageArea = document.getElementById('messageArea');
    const reservationList = document.getElementById('reservationList');
    const formTitle = document.getElementById('formTitle');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');

    let isEditMode = false;

    // Load reservations from the database
    async function loadReservations() {
      try {
        const res = await fetch('/api/reservations');
        const json = await res.json();
        const data = json.data; // Open the data wrapper!
        
        reservationList.innerHTML = ''; 
        if (data && data.length > 0) {
          data.forEach(resItem => {
            const li = document.createElement('li');
            li.className = 'p-4 border border-gray-200 rounded-lg bg-gray-50 flex justify-between items-center hover:shadow-md transition';
            
            // Format the start time using snake_case properties
            const start = new Date(resItem.start_time).toLocaleString();
            
            li.innerHTML = `
              <div>
                <p class="font-bold">Resource ${resItem.resource_id} <span class="font-normal text-sm text-gray-500">(User ${resItem.user_id})</span></p>
                <p class="text-sm text-gray-600 mt-1">${start}</p>
                <span class="inline-block mt-2 text-xs font-semibold px-2 py-1 uppercase rounded-full ${resItem.status === 'active' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">${resItem.status}</span>
              </div>
              <div class="flex flex-col sm:flex-row gap-2">
                <button onclick="editReservation(${resItem.id})" class="px-3 py-1 bg-gray-200 hover:bg-gray-300 text-sm font-medium rounded transition">Edit</button>
                <button onclick="deleteReservation(${resItem.id})" class="px-3 py-1 bg-brand-primary hover:bg-brand-rose text-white text-sm font-medium rounded transition shadow">Delete</button>
              </div>
            `;
            reservationList.appendChild(li);
          });
        } else {
          reservationList.innerHTML = '<li class="text-gray-500 italic p-4 text-center">No reservations found.</li>';
        }
      } catch (error) {
        showMessage('Failed to load reservations', 'error');
      }
    }

    // Submit the form (Create or Update)
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // The backend expects camelCase when we POST data to it
      const payload = {
        resourceId: parseInt(document.getElementById('resourceId').value),
        userId: parseInt(document.getElementById('userId').value),
        startTime: new Date(document.getElementById('startTime').value).toISOString(),
        endTime: new Date(document.getElementById('endTime').value).toISOString(),
        note: document.getElementById('note').value,
        status: document.getElementById('status').value
      };

      const resId = document.getElementById('reservationId').value;
      const url = isEditMode ? `/api/reservations/${resId}` : '/api/reservations';
      const method = isEditMode ? 'PUT' : 'POST';

      try {
        const response = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          showMessage(`Reservation successfully ${isEditMode ? 'updated' : 'created'}!`, 'success');
          clearForm();
          loadReservations(); // Refresh the list!
        } else {
          showMessage('Error saving reservation. Check your inputs.', 'error');
        }
      } catch (error) {
        showMessage('Server error', 'error');
      }
    });

    // Edit an existing reservation
    async function editReservation(id) {
      try {
        const res = await fetch(`/api/reservations/${id}`);
        const json = await res.json();
        const data = json.data; // Open the data wrapper!
        
        // Fill the form using snake_case properties
        document.getElementById('reservationId').value = data.id;
        document.getElementById('resourceId').value = data.resource_id;
        document.getElementById('userId').value = data.user_id;
        document.getElementById('startTime').value = data.start_time.slice(0, 16);
        document.getElementById('endTime').value = data.end_time.slice(0, 16);
        document.getElementById('note').value = data.note || '';
        document.getElementById('status').value = data.status || 'active';

        isEditMode = true;
        formTitle.textContent = 'Edit Reservation';
        saveBtn.textContent = 'Update';
        saveBtn.classList.replace('bg-brand-primary', 'bg-brand-orange'); 
        saveBtn.classList.replace('hover:bg-brand-rose', 'hover:bg-orange-600');
        
        window.scrollTo({ top: 0, behavior: 'smooth' }); // Scroll up to form
      } catch (error) {
        showMessage('Could not load reservation details', 'error');
      }
    }

    // Delete a reservation
    async function deleteReservation(id) {
      if (!confirm('Are you sure you want to delete this reservation?')) return;
      
      try {
        const res = await fetch(`/api/reservations/${id}`, { method: 'DELETE' });
        if (res.ok || res.status === 204) {
          showMessage('Reservation deleted!', 'success');
          if (document.getElementById('reservationId').value == id) clearForm();
          loadReservations(); // Refresh the list!
        }
      } catch (error) {
        showMessage('Failed to delete', 'error');
      }
    }

    // Clear the form back to default
    function clearForm() {
      form.reset();
      document.getElementById('reservationId').value = '';
      isEditMode = false;
      formTitle.textContent = 'Create Reservation';
      saveBtn.textContent = 'Create';
      saveBtn.classList.replace('bg-brand-orange', 'bg-brand-primary');
      saveBtn.classList.replace('hover:bg-orange-600', 'hover:bg-brand-rose');
    }

    clearBtn.addEventListener('click', clearForm);

    // Show alert messages
    function showMessage(text, type) {
      messageArea.textContent = text;
      messageArea.className = `p-4 mb-6 rounded-md font-medium text-center ${type === 'success' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'}`;
      messageArea.classList.remove('hidden');
      setTimeout(() => messageArea.classList.add('hidden'), 4000);
    }

    // Logout logic
    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    });

    // Load the list immediately when the page opens
    loadReservations();
  </script>
</body>
</html>
